global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3000']
    metrics_path: '/metrics'

  - job_name: 'service-orders'
    static_configs:
      - targets: ['service-orders:3001']
    metrics_path: '/metrics'

  - job_name: 'service-users'
    static_configs:
      - targets: ['service-users:3002']
    metrics_path: '/metrics'
